name: Ubuntu Desktop XRDP with Tailscale

on:
workflow_dispatch:
inputs:
ts_authkey:
description: Tailscale Auth Key
required: true

jobs:
ubuntu-rdp:
runs-on: ubuntu-latest
timeout-minutes: 300

env:
  USERNAME: devxrdp
  PASSWORD: UbuntuRDP2025!
  TS_HOSTNAME: UbuntuRDP

steps:
  - name: Install XFCE + XRDP
    run: |
      sudo apt-get update
      sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
        xfce4 xfce4-goodies xrdp

  - name: Create User
    run: |
      sudo useradd -m -s /bin/bash $USERNAME || true
      echo "$USERNAME:$PASSWORD" | sudo chpasswd
      echo "startxfce4" | sudo tee /home/$USERNAME/.xsession
      sudo chown $USERNAME:$USERNAME /home/$USERNAME/.xsession

  - name: Configure XRDP
    run: |
      sudo adduser xrdp ssl-cert
      sudo systemctl enable xrdp
      sudo systemctl restart xrdp

  - name: Install Tailscale
    run: |
      curl -fsSL https://tailscale.com/install.sh | sh
      sudo tailscale up \
        --authkey "${{ inputs.ts_authkey }}" \
        --hostname "$TS_HOSTNAME"

  - name: Show Connection Info
    run: |
      echo "================================="
      echo "USER : $USERNAME"
      echo "PASS : $PASSWORD"
      echo "IP   : $(tailscale ip -4)"
      echo "PORT : 3389"
      echo "================================="

  - name: Keep Alive
    run: |
      sleep 18000
